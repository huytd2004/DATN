spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5432/datn
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    access-token-expiration: 900000 # 15 minutes in ms
    refresh-token-expiration: 604800000 # 7 days in ms
  translate:
    quick-url: https://translate.googleapis.com/translate_a/single
  tutor:
    ai-base-url: http://localhost:8001
    browser-tts: true
